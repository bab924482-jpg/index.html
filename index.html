<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>روايات ذوالفقار - العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* تعريف متغيرات الألوان (للوضعين الفاتح والداكن) */
        :root {
            --bg: #f5f6fa; --text: #2d3436; --card: #ffffff; --primary: #ff6b00; /* لون أورنج حيوي */
            --nav-bg: #ffffff; --nav-text: #636e72; --shadow: rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #121212; --text: #dfe6e9; --card: #1e1e1e; --primary: #ff8533;
            --nav-bg: #1e1e1e; --nav-text: #b2bec3; --shadow: rgba(255,255,255,0.01);
        }

        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding-bottom: 75px; /* مساحة للشريط السفلي */
            transition: background 0.3s, color 0.3s; overscroll-behavior: none;
        }

        /* رأس الصفحة (Header) */
        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); box-shadow: 0 2px 15px var(--shadow); position: sticky; top: 0; z-index: 100;
        }
        .app-name { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
        .theme-toggle { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); opacity: 0.8; }

        /* قسم العناوين */
        .section-header { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; }
        .see-all { font-size: 14px; color: var(--primary); font-weight: 600; cursor: pointer; }

        /* --- (1) تصميم تصفح الأغلفة أفقياً (مثل الصورة) --- */
        .featured-scroll {
            display: flex; overflow-x: auto; padding: 10px 20px; gap: 15px;
            scrollbar-width: none; /* إخفاء شريط التمرير على الفايرفوكس */
            -webkit-overflow-scrolling: touch; /* تمرير سلس على iOS */
        }
        .featured-scroll::-webkit-scrollbar { display: none; } /* إخفاء شريط التمرير على كروم */

        .featured-card {
            min-width: 130px; max-width: 130px; background: var(--card);
            border-radius: 12px; box-shadow: 0 5px 20px var(--shadow);
            overflow: hidden; transition: transform 0.2s;
        }
        .featured-card:active { transform: scale(0.97); }
        .featured-card img { width: 100%; height: 190px; object-fit: cover; display: block; }
        .featured-info { padding: 8px; text-align: center; }
        .featured-title { font-size: 13px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- (2) تصميم قائمة القصص العمودية (مثل الصورة) --- */
        .story-list { padding: 10px 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .story-item {
            background: var(--card); border-radius: 12px; padding: 12px;
            display: flex; gap: 15px; align-items: center;
            box-shadow: 0 3px 15px var(--shadow); cursor: pointer; transition: background 0.2s;
        }
        .story-item:active { background: rgba(0,0,0,0.03); }
        [data-theme="dark"] .story-item:active { background: rgba(255,255,255,0.03); }

        .story-cover-mini { width: 60px; height: 80px; border-radius: 8px; object-fit: cover; }
        
        .story-details { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .story-title-list { font-size: 16px; font-weight: 600; margin: 0; }
        .story-author { font-size: 13px; color: var(--nav-text); margin: 0; }
        .story-category {
            display: inline-block; background: rgba(255, 107, 0, 0.1); color: var(--primary);
            font-size: 11px; padding: 3px 8px; border-radius: 15px; font-weight: 600; align-self: flex-start;
        }

        /* --- (3) تصميم شريط التنقل السفلي (مثل الصورة) --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid rgba(0,0,0,0.05); box-shadow: 0 -2px 15px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--nav-text); cursor: pointer; font-size: 12px; font-weight: 600;
            transition: color 0.2s, opacity 0.2s;
        }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        
        .nav-item.active { color: var(--primary); }
        .nav-item:not(.active) { opacity: 0.7; }
    </style>
</head>
<body id="body">

<header>
    <div class="app-name">روايات ذوالفقار</div>
    <button class="theme-toggle" onclick="toggleDarkMode()" id="themeBtn">☀️</button>
</header>

<div class="section-header">
    <h2 class="section-title">الأكثر قراءة ��لآن</h2>
    <span class="see-all">عرض الكل</span>
</div>

<div class="featured-scroll">
    <div class="featured-card">
        <img src="https://i.postimg.cc/XvBw1N6s/cover1.jpg" alt="نور وصقر">
        <div class="featured-info"><p class="featured-title">نور وصقر</p></div>
    </div>
    <div class="featured-card">
        <img src="https://i.postimg.cc/Kz8p7XWd/cover2.jpg" alt="قيود الغبار">
        <div class="featured-info"><p class="featured-title">قيود الغبار</p></div>
    </div>
    <div class="featured-card">
        <img src="https://i.postimg.cc/MZsH5T9h/cover3.jpg" alt="عشق العشيرة">
        <div class="featured-info"><p class="featured-title">عشق العشيرة</p></div>
    </div>
</div>

<div class="section-header">
    <h2 class="section-title">أحدث القصص العراقية</h2>
</div>

<div class="story-list">
    <div class="story-item">
        <img src="https://i.postimg.cc/XvBw1N6s/cover1.jpg" alt="غلاف" class="story-cover-mini">
        <div class="story-details">
            <h3 class="story-title-list">نهوة قلم</h3>
            <p class="story-author">بواسطة ذوالفقار الفريجي</p>
            <span class="story-category">دراما عشائرية</span>
        </div>
    </div>
    <div class="story-item">
        <img src="https://i.postimg.cc/Kz8p7XWd/cover2.jpg" alt="غلاف" class="story-cover-mini">
        <div class="story-details">
            <h3 class="story-title-list">بين نارين الفصلية</h3>
            <p class="story-author">بواسطة ذوالفقار الفريجي</p>
            <span class="story-category">رومانسية</span>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>الرئيسية</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">🔍</span>
        <span>استكشف</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">📖</span>
        <span>مكتبتي</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">👤</span>
        <span>حسابي</span>
    </div>
</nav>

<script>
    // جافا سكريبت للتحكم في الوضع الليلي
    function toggleDarkMode() {
        const body = document.getElementById('body');
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = body.getAttribute('data-theme');
        
        if (currentTheme === 'dark') {
            body.removeAttribute('data-theme');
            themeBtn.innerText = '☀️';
            localStorage.setItem('theme', 'light'); // حفظ الإعداد
        } else {
            body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '🌙';
            localStorage.setItem('theme', 'dark'); // حفظ الإعداد
        }
    }

    // تفعيل الوضع المحفوظ عند تحميل الصفحة
    window.onload = function() {
        const savedTheme = localStorage.getItem('theme');
        const body = document.getElementById('body');
        const themeBtn = document.getElementById('themeBtn');
        if (savedTheme === 'dark') {
            body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '🌙';
        }
    }
</script>

</body>
</html>
