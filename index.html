<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Hub Pro</title>
    <style>
        :root { --main-red: #ff0000; --bg-black: #0a0a0a; --card-bg: #111; --btn-green: #28a745; }
        body { background-color: var(--bg-black); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid var(--main-red); }
        .header h1 { margin: 0; font-size: 18px; color: var(--main-red); }
        .container { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .video-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #222; cursor: pointer; position: relative; }
        .video-card img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .play-overlay { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: white; text-shadow: 0 0 10px #000; }
        .video-info { padding: 8px; font-size: 12px; text-align: center; font-weight: bold; background: #161616; }
        
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: var(--main-red); color: white; border: none; padding: 8px 15px; border-radius: 4px; z-index: 10001; font-weight: bold; cursor: pointer; }
        
        #waiting-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; }
        /* الزر الافتراضي أخضر */
        .ad-btn { background: var(--btn-green); color: white; padding: 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; }
        /* تنسيق الزر عند الفشل */
        .btn-fail { background: var(--main-red) !important; animation: shake 0.5s; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        
        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
