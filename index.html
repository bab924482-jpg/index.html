<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>قصصي - منصة القصص</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; -webkit-tap-highlight-color: transparent; }
        
        /* شاشة التحميل */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff500a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        .splash-content {
            text-align: center;
            color: white;
        }
        .splash-content i {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Auth Screen */
        #auth-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff500a, #ff8c42);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        /* Main App */
        #main-app {
            display: none;
            padding-bottom: 70px;
        }
        
        .screen {
            display: none;
            min-height: 100vh;
            background: #f5f5f5;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .top-bar {
            background: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 20px;
            border-top: 1px solid #eee;
            z-index: 999;
        }
        
        .nav-item {
            text-align: center;
            color: #888;
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item.active { color: #ff500a; }
        .nav-item.center-pen {
            background: #ff500a;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 4px 10px rgba(255,80,10,0.3);
        }
        
        .shelf {
            margin: 20px 15px;
        }
        .shelf-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 10px;
        }
        .story-item {
            min-width: 110px;
            height: 150px;
            background: #ddd;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .story-item:active { transform: scale(0.95); }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff500a;
        }
        
        button {
            background: #ff500a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        
        .menu-item {
            background: white;
            padding: 18px;
            margin: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .menu-item:active {
            background: #f0f0f0;
            transform: scale(0.98);
        }
        
        .alert-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .alert-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10001;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff500a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            z-index: 10002;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- شاشة البداية -->
<div id="splash-screen">
    <div class="splash-content">
        <i class="fa-solid fa-book-open"></i>
        <h2>📖 قصصي</h2>
        <p>جاري التحميل...</p>
    </div>
</div>

<!-- شاشة تسجيل الدخول -->
<div id="auth-screen">
    <div class="auth-container">
        <h2 style="text-align:center; margin-bottom:20px; color:#ff500a;">📖 قصصي</h2>
        <input type="email" id="auth-email" placeholder="البريد الإلكتروني">
        <input type="password" id="auth-password" placeholder="كلمة المرور">
        <button id="auth-submit-btn" style="width:100%;">دخول</button>
        <p id="auth-toggle-text" style="text-align:center; margin-top:15px; color:#ff500a; cursor:pointer;">ليس لديك حساب؟ سجل الآن</p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="main-app">
    
    <!-- شاشة الرئيسية -->
    <div id="home-screen" class="screen active">
        <div class="shelf">
            <div class="shelf-title">✨ أبرز القصص</div>
            <div id="featured-container" class="scroll-container"></div>
        </div>
        <div class="shelf">
            <div class="shelf-title">🔥 الأكثر مشاهدة</div>
            <div id="popular-container" class="scroll-container"></div>
        </div>
        <div class="shelf">
            <div class="shelf-title">🆕 أحدث القصص</div>
            <div id="latest-container" class="scroll-container"></div>
        </div>
    </div>
    
    <!-- شاشة البحث -->
    <div id="search-screen" class="screen">
        <div class="top-bar">
            <span onclick="showScreen('home')" style="cursor:pointer;"><i class="fa-solid fa-arrow-right"></i></span>
            <span style="font-weight:bold;">🔍 بحث</span>
            <span></span>
        </div>
        <div style="padding: 15px;">
            <input type="text" id="search-box" placeholder="ابحث عن قصة...">
            <div id="search-results"></div>
        </div>
    </div>
    
    <!-- شاشة الكتابة -->
    <div id="write-screen" class="screen">
        <div class="top-bar">
            <span onclick="showScreen('home')" style="cursor:pointer;"><i class="fa-solid fa-arrow-right"></i></span>
            <span style="font-weight:bold;">✍️ الكتابة</span>
            <span></span>
        </div>
        <div class="menu-item" id="btn-create-story">📖 إنشاء قصة جديدة <i class="fa-solid fa-plus"></i></div>
        <div class="menu-item" id="btn-my-stories">📚 قصصي <i class="fa-solid fa-list"></i></div>
        <div class="menu-item" id="btn-add-chapter">➕ إضافة فصل <i class="fa-solid fa-plus"></i></div>
    </div>
    
    <!-- شاشة المكتبة -->
    <div id="library-screen" class="screen">
        <div class="top-bar">
            <span onclick="showScreen('home')" style="cursor:pointer;"><i class="fa-solid fa-arrow-right"></i></span>
            <span style="font-weight:bold;">📚 مكتبتي</span>
            <span></span>
        </div>
        <div id="library-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px;"></div>
    </div>
    
    <!-- شاشة إنشاء قصة -->
    <div id="create-story-screen" class="screen">
        <div class="top-bar">
            <span onclick="showScreen('write')" style="cursor:pointer;"><i class="fa-solid fa-arrow-right"></i></span>
            <span>إنشاء قصة جديدة</span>
            <span id="create-next-btn" style="color:#ccc; cursor:pointer;">التالي</span>
        </div>
        <div style="padding: 15px;">
            <div id="cover-upload" style="width:120px; height:150px; background:#eee; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-bottom:20px; background-size:cover; background-position:center;">
                <i class="fa-solid fa-plus" style="font-size:30px; color:#aaa;"></i>
            </div>
            <input type="text" id="story-title" placeholder="عنوان القصة">
            <input type="text" id="story-author" placeholder="اسم الكاتب">
            <textarea id="story-desc" placeholder="وصف القصة" rows="4"></textarea>
        </div>
    </div>
    
    <!-- شاشة تحرير الفصل -->
    <div id="editor-screen" class="screen">
        <div class="top-bar">
            <span onclick="showScreen('create-story')" style="cursor:pointer;"><i class="fa-solid fa-arrow-right"></i></span>
            <span>كتابة فصل</span>
            <button id="publish-chapter-btn" style="padding:8px 20px;">نشر</button>
        </div>
        <div style="padding: 15px;">
            <input type="text" id="chapter-title" placeholder="عنوان الفصل">
            <textarea id="chapter-content" placeholder="اكتب قصتك هنا..." rows="12"></textarea>
        </div>
    </div>
    
    <!-- شاشة تفاصيل القصة -->
    <div id="story-detail-screen" class="screen">
        <div class="top-bar">
            <span onclick="showScreen('home')" style="cursor:pointer;"><i class="fa-solid fa-arrow-right"></i></span>
            <span>تفاصيل القصة</span>
            <span></span>
        </div>
        <div id="story-detail-content" style="padding: 15px;"></div>
    </div>
    
    <!-- القائمة السفلية -->
    <div class="bottom-nav">
        <div class="nav-item active" data-screen="home"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" data-screen="search"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="nav-item center-pen" data-screen="write"><i class="fa-solid fa-pen"></i></div>
        <div class="nav-item" data-screen="library"><i class="fa-solid fa-bookmark"></i></div>
        <div class="nav-item" data-screen="notifications"><i class="fa-regular fa-bell"></i></div>
    </div>
</div>

<!-- تنبيه مخصص -->
<div id="alert-modal" class="alert-modal">
    <div class="alert-content">
        <p id="alert-message"></p>
        <button onclick="closeAlert()" style="margin-top:15px;">موافق</button>
    </div>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
</div>

<div id="error-toast" class="error-toast"></div>

<script>
    // ====================== إعداد Supabase ======================
    const supabaseUrl = 'https://warzwyuiiapkdbwbtchg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhcnd6eXVpaWFwa2Rid2J0Y2hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI9MjA0NTc2MDAwMH0.dummy';
    
    let supabase;
    let currentUser = null;
    let currentStoryId = null;
    let coverImageData = null;
    let isEditMode = false;
    let editStoryId = null;
    
    // محاولة إنشاء اتصال Supabase مع معالجة الأخطاء
    try {
        supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
        console.log('✅ Supabase connected');
    } catch(e) {
        console.error('❌ Supabase error:', e);
        // استمر بدون Supabase (وضع تجريبي)
        supabase = null;
    }
    
    // ====================== دوال مساعدة ======================
    function showLoading(show) {
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.style.display = show ? 'flex' : 'none';
    }
    
    function showAlert(msg) {
        const alertMsg = document.getElementById('alert-message');
        const alertModal = document.getElementById('alert-modal');
        if (alertMsg) alertMsg.innerText = msg;
        if (alertModal) alertModal.style.display = 'flex';
    }
    
    function closeAlert() {
        const alertModal = document.getElementById('alert-modal');
        if (alertModal) alertModal.style.display = 'none';
    }
    
    function showErrorToast(msg) {
        const toast = document.getElementById('error-toast');
        if (toast) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    }
    
    // ====================== نظام الشاشات ======================
    function showScreen(screenName) {
        const screens = ['home', 'search', 'write', 'library', 'create-story', 'editor', 'story-detail'];
        screens.forEach(s => {
            const el = document.getElementById(`${s}-screen`);
            if (el) el.classList.remove('active');
        });
        
        const target = document.getElementById(`${screenName}-screen`);
        if (target) target.classList.add('active');
        
        // تحديث القائمة السفلية
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.screen === screenName) {
                item.classList.add('active');
            }
        });
        
        // تحديث البيانات عند فتح بعض الشاشات
        if (screenName === 'library') loadLibrary();
        if (screenName === 'home') loadStories();
    }
    
    // ====================== تحميل القصص ======================
    async function loadStories() {
        if (!supabase) {
            showErrorToast('⚠️ وضع تجريبي - لا يوجد اتصال بقاعدة البيانات');
            return;
        }
        
        showLoading(true);
        try {
            const { data, error } = await supabase.from('stories').select('*').order('created_at', { ascending: false });
            showLoading(false);
            
            if (error) {
                console.error(error);
                showErrorToast('حدث خطأ في تحميل القصص');
                return;
            }
            
            if (data && data.length > 0) {
                const featured = data.slice(0, 10);
                const popular = [...data].sort((a,b) => (b.views||0) - (a.views||0)).slice(0, 10);
                const latest = data.slice(0, 10);
                
                renderStories('featured-container', featured);
                renderStories('popular-container', popular);
                renderStories('latest-container', latest);
            } else {
                // بيانات تجريبية للعرض
                const demoStories = [
                    { id: 1, title: 'قصة تجريبية 1', nem: 'كاتب 1', views: 100, image_data: null },
                    { id: 2, title: 'قصة تجريبية 2', nem: 'كاتب 2', views: 200, image_data: null },
                    { id: 3, title: 'قصة تجريبية 3', nem: 'كاتب 3', views: 150, image_data: null }
                ];
                renderStories('featured-container', demoStories);
                renderStories('popular-container', demoStories);
                renderStories('latest-container', demoStories);
            }
        } catch(e) {
            showLoading(false);
            console.error(e);
            showErrorToast('خطأ في الاتصال بقاعدة البيانات');
        }
    }
    
    function renderStories(containerId, stories) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        
        stories.forEach(story => {
            const div = document.createElement('div');
            div.className = 'story-item';
            const imgUrl = story.image_data || 'https://placehold.co/110x150/ff500a/white?text=📖';
            div.style.backgroundImage = `url(${imgUrl})`;
            div.onclick = () => openStoryDetail(story);
            container.appendChild(div);
        });
    }
    
    // ====================== تفاصيل القصة ======================
    async function openStoryDetail(story) {
        if (!supabase) {
            showAlert('وضع تجريبي - التفاصيل غير متاحة');
            return;
        }
        
        showLoading(true);
        currentStoryId = story.id;
        
        try {
            // تحديث عدد المشاهدات
            await supabase.from('stories').update({ views: (story.views || 0) + 1 }).eq('id', story.id);
            
            // جلب الفصول
            const { data: chapters, error } = await supabase.from('chapters').select('*').eq('story_id', story.id).order('id');
            showLoading(false);
            
            const detailDiv = document.getElementById('story-detail-content');
            const imgUrl = story.image_data || 'https://placehold.co/100x140/ff500a/white?text=📖';
            
            detailDiv.innerHTML = `
                <div style="display:flex; gap:15px; margin-bottom:20px;">
                    <div style="width:100px; height:140px; background-image:url(${imgUrl}); background-size:cover; border-radius:12px;"></div>
                    <div style="flex:1;">
                        <h2>${story.title || 'بدون عنوان'}</h2>
                        <p style="color:#ff500a;">${story.nem || 'كاتب غير معروف'}</p>
                        <p style="color:#888;"><i class="fa-solid fa-eye"></i> ${(story.views||0)+1} مشاهدة</p>
                    </div>
                </div>
                <div style="background:white; border-radius:12px; padding:15px; margin-bottom:20px;">
                    <h3>📖 عن القصة</h3>
                    <p>${story.description || 'لا يوجد وصف'}</p>
                </div>
                <div style="background:white; border-radius:12px; padding:15px;">
                    <h3>📑 الفصول (${chapters?.length || 0})</h3>
                    <div id="chapters-list"></div>
                </div>
            `;
            
            const chaptersList = document.getElementById('chapters-list');
            if (chapters && chapters.length > 0) {
                chaptersList.innerHTML = chapters.map((ch, i) => `
                    <div style="padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="readChapter(${ch.id}, '${story.title}')">
                        <span>${ch.title || `الفصل ${i+1}`}</span>
                        <i class="fa-solid fa-chevron-left"></i>
                    </div>
                `).join('');
            } else {
                chaptersList.innerHTML = '<p style="color:#888;">لا توجد فصول بعد</p>';
            }
            
            // إضافة زر تحميل للمكتبة
            const addToLibBtn = document.createElement('button');
            addToLibBtn.textContent = '📥 تحميل في مكتبتي';
            addToLibBtn.style.width = '100%';
            addToLibBtn.style.marginTop = '15px';
            addToLibBtn.onclick = () => addToLibrary(story);
            detailDiv.appendChild(addToLibBtn);
            
            showScreen('story-detail');
        } catch(e) {
            showLoading(false);
            showErrorToast('حدث خطأ');
        }
    }
    
    // قراءة فصل
    window.readChapter = async (chapterId, storyTitle) => {
        if (!supabase) return;
        
        showLoading(true);
        const { data, error } = await supabase.from('chapters').select('*').eq('id', chapterId).single();
        showLoading(false);
        
        if (error) return;
        
        const detailDiv = document.getElementById('story-detail-content');
        detailDiv.innerHTML = `
            <div style="margin-bottom:15px;">
                <span onclick="openStoryDetail({id: '${currentStoryId}'})" style="color:#ff500a; cursor:pointer;">
                    <i class="fa-solid fa-arrow-right"></i> رجوع للقصة
                </span>
            </div>
            <h2>${data.title || 'فصل'}</h2>
            <div style="line-height:1.8; margin-top:20px; white-space:pre-wrap;">${data.content || 'لا يوجد محتوى'}</div>
        `;
    };
    
    // ====================== المكتبة المحلية ======================
    function addToLibrary(story) {
        let library = JSON.parse(localStorage.getItem('story_library') || '[]');
        if (library.length >= 6) {
            showAlert('مكتبتك ممتلئة! احذف بعض القصص أولاً');
            return;
        }
        if (library.find(s => s.id === story.id)) {
            showAlert('القصة موجودة بالفعل في مكتبتك');
            return;
        }
        library.push(story);
        localStorage.setItem('story_library', JSON.stringify(library));
        showAlert('تمت إضافة القصة إلى مكتبتك ✅');
    }
    
    function loadLibrary() {
        const library = JSON.parse(localStorage.getItem('story_library') || '[]');
        const container = document.getElementById('library-container');
        if (!container) return;
        container.innerHTML = '';
        
        if (library.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888; grid-column:span 3;">مكتبتك فارغة 📭</p>';
            return;
        }
        
        library.forEach(story => {
            const div = document.createElement('div');
            div.style.position = 'relative';
            const imgUrl = story.image_data || 'https://placehold.co/150x200/ff500a/white?text=📖';
            div.innerHTML = `
                <div style="width:100%; aspect-ratio:2/3; background-image:url(${imgUrl}); background-size:cover; border-radius:12px; cursor:pointer;" onclick='openStoryDetail(${JSON.stringify(story)})'></div>
                <div style="position:absolute; top:5px; left:5px; background:rgba(0,0,0,0.6); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="removeFromLibrary('${story.id}')">
                    <i class="fa-solid fa-trash" style="color:white; font-size:12px;"></i>
                </div>
                <p style="font-size:12px; margin-top:5px; text-align:center;">${story.title}</p>
            `;
            container.appendChild(div);
        });
    }
    
    window.removeFromLibrary = (storyId) => {
        let library = JSON.parse(localStorage.getItem('story_library') || '[]');
        library = library.filter(s => s.id != storyId);
        localStorage.setItem('story_library', JSON.stringify(library));
        loadLibrary();
        showAlert('تم الحذف من المكتبة');
    };
    
    // ====================== إنشاء قصة ======================
    document.getElementById('cover-upload')?.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    coverImageData = event.target.result;
                    const uploadDiv = document.getElementById('cover-upload');
                    uploadDiv.style.backgroundImage = `url(${coverImageData})`;
                    uploadDiv.style.backgroundSize = 'cover';
                    uploadDiv.innerHTML = '';
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });
    
    document.getElementById('create-next-btn')?.addEventListener('click', async () => {
        if (!supabase) {
            showAlert('وضع تجريبي - لا يمكن إنشاء قصص جديدة');
            return;
        }
        
        const title = document.getElementById('story-title')?.value.trim();
        const author = document.getElementById('story-author')?.value.trim();
        const desc = document.getElementById('story-desc')?.value.trim();
        
        if (!title || !author || !desc) {
            showAlert('يرجى ملء جميع الحقول');
            return;
        }
        if (!coverImageData) {
            showAlert('يرجى إضافة غلاف للقصة');
            return;
        }
        
        showLoading(true);
        
        if (isEditMode && editStoryId) {
            await supabase.from('stories').update({
                title, nem: author, description: desc, image_data: coverImageData
            }).eq('id', editStoryId);
            showAlert('تم تحديث القصة بنجاح');
            isEditMode = false;
            editStoryId = null;
        } else {
            const { data, error } = await supabase.from('stories').insert([{
                title, nem: author, description: desc, image_data: coverImageData,
                user_id: currentUser, views: 0, created_at: new Date().toISOString()
            }]).select();
            
            if (error) {
                showAlert('خطأ: ' + error.message);
                showLoading(false);
                return;
            }
            if (data && data[0]) {
                currentStoryId = data[0].id;
                showScreen('editor');
                showAlert('أضف الفصل الأول الآن');
            }
        }
        
        // تنظيف الحقول
        const titleInput = document.getElementById('story-title');
        const authorInput = document.getElementById('story-author');
        const descInput = document.getElementById('story-desc');
        if (titleInput) titleInput.value = '';
        if (authorInput) authorInput.value = '';
        if (descInput) descInput.value = '';
        coverImageData = null;
        const uploadDiv = document.getElementById('cover-upload');
        if (uploadDiv) {
            uploadDiv.innerHTML = '<i class="fa-solid fa-plus" style="font-size:30px; color:#aaa;"></i>';
            uploadDiv.style.backgroundImage = '';
        }
        
        showLoading(false);
        showScreen('home');
        loadStories();
    });
    
    // ====================== نشر فصل ======================
    document.getElementById('publish-chapter-btn')?.addEventListener('click', async () => {
        if (!supabase) {
            showAlert('وضع تجريبي - لا يمكن نشر فصول');
            return;
        }
        
        const title = document.getElementById('chapter-title')?.value.trim();
        const content = document.getElementById('chapter-content')?.value.trim();
        
        if (!title || !content) {
            showAlert('يرجى إدخال عنوان ومحتوى الفصل');
            return;
        }
        if (!currentStoryId) {
            showAlert('حدث خطأ، يرجى المحاولة مرة أخرى');
            return;
        }
        
        showLoading(true);
        const { error } = await supabase.from('chapters').insert([{
            story_id: currentStoryId,
            title: title,
            content: content
        }]);
        
        showLoading(false);
        
        if (error) {
            showAlert('خطأ: ' + error.message);
        } else {
            showAlert('تم نشر الفصل بنجاح 🎉');
            const chapterTitle = document.getElementById('chapter-title');
            const chapterContent = document.getElementById('chapter-content');
            if (chapterTitle) chapterTitle.value = '';
            if (chapterContent) chapterContent.value = '';
            showScreen('home');
            loadStories();
        }
    });
    
    // ====================== البحث ======================
    document.getElementById('search-box')?.addEventListener('input', async (e) => {
        if (!supabase) return;
        
        const query = e.target.value.trim();
        if (query.length < 2) {
            const resultsDiv = document.getElementById('search-results');
            if (resultsDiv) resultsDiv.innerHTML = '';
            return;
        }
        
        const { data } = await supabase.from('stories').select('*').or(`title.ilike.%${query}%,description.ilike.%${query}%`).limit(20);
        
        const resultsDiv = document.getElementById('search-results');
        if (!resultsDiv) return;
        resultsDiv.innerHTML = '';
        (data || []).forEach(story => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex; gap:12px; padding:12px; background:white; margin-bottom:8px; border-radius:12px; cursor:pointer;';
            div.onclick = () => openStoryDetail(story);
            const imgUrl = story.image_data || 'https://placehold.co/60x80/ff500a/white?text=📖';
            div.innerHTML = `
                <div style="width:60px; height:80px; background-image:url(${imgUrl}); background-size:cover; border-radius:8px;"></div>
                <div style="flex:1;">
                    <div style="font-weight:bold;">${story.title || 'بدون عنوان'}</div>
                    <div style="color:#ff500a; font-size:12px;">${story.nem || 'كاتب'}</div>
                    <div style="color:#888; font-size:11px;"><i class="fa-solid fa-eye"></i> ${story.views || 0}</div>
                </div>
            `;
            resultsDiv.appendChild(div);
        });
    });
    
    // ====================== تسجيل الدخول ======================
    let isLogin = true;
    function toggleAuth() {
        isLogin = !isLogin;
        const btn = document.getElementById('auth-submit-btn');
        const toggleText = document.getElementById('auth-toggle-text');
        if (btn) btn.textContent = isLogin ? 'دخول' : 'إنشاء حساب';
        if (toggleText) toggleText.textContent = isLogin ? 'ليس لديك حساب؟ سجل الآن' : 'لديك حساب؟ سجل الدخول';
    }
    document.getElementById('auth-toggle-text')?.addEventListener('click', toggleAuth);
    
    document.getElementById('auth-submit-btn')?.addEventListener('click', async () => {
        if (!supabase) {
            // وضع تجريبي - تخطي تسجيل الدخول
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('splash-screen')?.remove();
            loadStories();
            return;
        }
        
        const email = document.getElementById('auth-email')?.value;
        const password = document.getElementById('auth-password')?.value;
        
        if (!email || !password) {
            showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');
            return;
        }
        
        showLoading(true);
        let result;
        if (isLogin) {
            result = await supabase.auth.signInWithPassword({ email, password });
        } else {
            result = await supabase.auth.signUp({ email, password });
        }
        showLoading(false);
        
        if (result.error) {
            showAlert(result.error.message);
        } else {
            if (!isLogin) {
                showAlert('تم إنشاء الحساب! يرجى تأكيد بريدك الإلكتروني ثم تسجيل الدخول');
            } else {
                window.location.reload();
            }
        }
    });
    
    // ====================== أزرار الكتابة ======================
    document.getElementById('btn-create-story')?.addEventListener('click', () => {
        isEditMode = false;
        editStoryId = null;
        showScreen('create-story');
    });
    
    document.getElementById('btn-my-stories')?.addEventListener('click', async () => {
        if (!supabase) {
            showAlert('وضع تجريبي - سجل دخولك أولاً');
            return;
        }
        
        showLoading(true);
        const { data } = await supabase.from('stories').select('*').eq('user_id', currentUser);
        showLoading(false);
        
        if (!data || data.length === 0) {
            showAlert('لا توجد قصص لك بعد');
            return;
        }
        
        let storyList = '📖 قصصك:\n\n';
        data.forEach((s, i) => {
            storyList += `${i+1}. ${s.title}\n`;
        });
        storyList += '\nاختر قصة للتعديل (أدخل الرقم):';
        const storyNum = prompt(storyList);
        if (storyNum && data[parseInt(storyNum)-1]) {
            const story = data[parseInt(storyNum)-1];
            isEditMode = true;
            editStoryId = story.id;
            const titleInput = document.getElementById('story-title');
            const authorInput = document.getElementById('story-author');
            const descInput = document.getElementById('story-desc');
            if (titleInput) titleInput.value = story.title;
            if (authorInput) authorInput.value = story.nem;
            if (descInput) descInput.value = story.description;
            coverImageData = story.image_data;
            const uploadDiv = document.getElementById('cover-upload');
            if (uploadDiv && story.image_data) {
                uploadDiv.style.backgroundImage = `url(${story.image_data})`;
                uploadDiv.style.backgroundSize = 'cover';
                uploadDiv.innerHTML = '';
            }
            showScreen('create-story');
        }
    });
    
    document.getElementById('btn-add-chapter')?.addEventListener('click', async () => {
        if (!supabase) {
            showAlert('وضع تجريبي - سجل دخولك أولاً');
            return;
        }
        
        showLoading(true);
        const { data } = await supabase.from('stories').select('id, title').eq('user_id', currentUser);
        showLoading(false);
        
        if (!data || data.length === 0) {
            showAlert('ليس لديك قصص بعد، أنشئ قصة أولاً');
            return;
        }
        
        let storyList = 'اختر قصة لإضافة فصل:\n\n';
        data.forEach((s, i) => {
            storyList += `${i+1}. ${s.title}\n`;
        });
        const choice = prompt(storyList + '\n\nأدخل رقم القصة:');
        if (choice && data[parseInt(choice)-1]) {
            currentStoryId = data[parseInt(choice)-1].id;
            showScreen('editor');
        }
    });
    
    // ====================== ربط القائمة السفلية ======================
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const screen = item.dataset.screen;
            if (screen && screen !== 'notifications') {
                showScreen(screen);
            } else if (screen === 'notifications') {
                showAlert('قريباً... سيتم إضافة الإشعارات');
            }
        });
    });
    
    // ====================== التحقق من الجلسة وبدء التطبيق ======================
    async function initApp() {
        try {
            if (supabase) {
                const { data } = await supabase.auth.getSession();
                if (data && data.session) {
                    currentUser = data.session.user.id;
                    document.getElementById('splash-screen')?.remove();
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    loadStories();
                    
                    // التحقق من رابط مباشر
                    const urlParams = new URLSearchParams(window.location.search);
                    const storyId = urlParams.get('story_id');
                    if (storyId) {
                        const { data: story } = await supabase.from('stories').select('*').eq('id', storyId).single();
                        if (story) openStoryDetail(story);
                    }
                    return;
                }
            }
            
            // إذا لم يكن هناك جلسة أو كان Supabase معطلاً
            document.getElementById('splash-screen')?.remove();
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        } catch(e) {
            console.error('Init error:', e);
            // في حالة الخطأ، نعرض شاشة تسجيل الدخول
            document.getElementById('splash-screen')?.remove();
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    }
    
    // بدء التطبيق بعد تحميل الصفحة
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(initApp, 1000);
    });
</script>
</body>
</html>
